<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE | Logged Out</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">

<body class="auth-wrapper">
    <!-- RTL/LTR Toggle -->
    <div style="position: fixed; top: 24px; right: 24px; z-index: 5000;">

    <div class="auth-container text-center">
        <a href="index.html" class="logo mb-4" style="justify-content: center;">

            CORE

        <h2>Successfully Logged Out</h2>
        <p>Thank you for using the CORE Dashboard. Your session has ended securely.</p>
        <a href="login.html" class="btn btn-primary mt-4">Sign In Again</a>
        <p class="mt-4"><a href="index.html" style="color: var(--clr-text-secondary);">Go to Homepage</a></p>
