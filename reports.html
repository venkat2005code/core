<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE | Reports & Analytics</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard-page">
    <!-- Floating Actions -->
    <div class="floating-actions">
        <button id="themeToggle" class="icon-btn" style="background: var(--clr-surface); border: 1px solid var(--clr-border); width: 44px; height: 44px; border-radius: 50%; box-shadow: var(--shadow-premium); color: var(--clr-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;">
            <i class="fa-solid fa-moon"></i>
        </button>
        <button id="dirToggle" class="icon-btn" style="background: var(--clr-surface); border: 1px solid var(--clr-border); width: 44px; height: 44px; border-radius: 50%; box-shadow: var(--shadow-premium); color: var(--clr-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center;">LTR</button>
    </div>

    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle navigation">
        <i class="fa-solid fa-bars"></i>
    </button>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
                <img src="assets/images/logo.png" alt="CORE">
                <span class="brand-name">CORE</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="user_dashboard.html"><i class="fa-solid fa-house"></i> Dashboard Overview</a></li>
                <li><a href="projects.html"><i class="fa-solid fa-briefcase"></i> Projects / Orders</a></li>
                <li><a href="products.html"><i class="fa-solid fa-box"></i> Products</a></li>
                <li><a href="reports.html" class="active"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
                <li><a href="documents.html"><i class="fa-solid fa-file-alt"></i> Documents</a></li>
                <li><a href="settings.html"><i class="fa-solid fa-cog"></i> Settings</a></li>
                <li><a href="logout.html"><i class="fa-solid fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </aside>

    <main class="dashboard-main">
        <h1>Reports & Analytics</h1>
        <p class="subtitle">Advanced manufacturing data and projections</p>

        <div class="grid grid-cols-2">
            <div class="card">
                <h3>Monthly Efficiency</h3>
                <div style="height: 300px;">
                    <canvas id="efficiencyChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h3>Resource Allocation</h3>
                <div style="height: 300px;">
                    <canvas id="resourceChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Monthly Efficiency Chart
            const ctxEff = document.getElementById('efficiencyChart').getContext('2d');
            new Chart(ctxEff, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'OEE (%)',
                        data: [78, 82, 80, 85, 88, 92],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });

            // Resource Allocation Chart
            const ctxRes = document.getElementById('resourceChart').getContext('2d');
            new Chart(ctxRes, {
                type: 'doughnut',
                data: {
                    labels: ['Production', 'Maintenance', 'R&D', 'Logistics'],
                    datasets: [{
                        data: [45, 20, 25, 10],
                        backgroundColor: ['#3b82f6', '#00e5ff', '#10b981', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: { color: '#94a3b8', boxWidth: 12, padding: 20 }
                        }
                    },
                    cutout: '70%'
                }
            });
        });
    </script>
</body>

</html>
